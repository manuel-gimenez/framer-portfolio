<!--
  Disable Tap Highlight — Framer site custom code.

  Problem it solves: on mobile, every button showed a gray box behind it when
  tapped (the browser's default tap-highlight), and long-pressing could trigger
  a system callout — both made the site feel less polished. This removes the tap
  highlight globally and suppresses the touch callout on interactive elements so
  taps feel clean and app-like.

  Usage: Site Settings → Custom Code → End of <body> tag, all pages, run once.

  Changelog
    v1.0.0 (30-06-2026) — Initial version.
-->
<style>
    * {
        -webkit-tap-highlight-color: transparent;
    }

    a,
    button,
    [role="button"] {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
    }
</style>
